name: ParaBank UI CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Playwright Cucumber Allure
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: true
      HEADLESS: true
      BROWSER: chromium
      BASE_URL: https://parabank.parasoft.com/parabank/
      PARABANK_USERNAME: john
      PARABANK_PASSWORD: demo
      TIMEOUT: 30000
      SLOW_MO: 0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Setup Java for Allure
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Type check
        run: npm run typecheck

      - name: Run Cucumber suite
        run: npm test || true

      - name: Generate Allure report
        if: always()
        run: npm run report:generate

      # 🔍 DEBUG: verify report generated
      - name: Verify Allure Report
        run: |
          echo "Listing allure-report contents:"
          ls -R allure-report || echo "No allure-report found"

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          if-no-files-found: warn

      - name: Send Email with Report Link
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "ParaBank Automation Test Report - ${{ job.status }}"
          to: cheekatlasatyadev@gmail.com
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            Test Execution Report
            ====================

            Status: ${{ job.status }}

            🌐 View Allure Report:
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/

            🔗 Workflow Run:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Regards,
            GitHub Actions

  deploy:
    name: Deploy Allure Report to GitHub Pages
    needs: test
    runs-on: ubuntu-latest
    if: always()

    permissions:
      pages: write
      id-token: write
      contents: read

    steps:
      - name: Download Allure Report Artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: artifact

      # 🔍 DEBUG: check downloaded files
      - name: Verify Artifact Content
        run: |
          echo "Artifact content:"
          ls -R artifact || echo "Artifact empty"

      # ✅ Prepare correct Pages structure
      - name: Prepare Pages Content
        run: |
          mkdir public
          cp -r artifact/* public/ || echo "Copy failed"
          touch public/.nojekyll

      # 🔍 DEBUG: confirm final structure
      - name: Verify Public Folder
        run: |
          echo "Public folder content:"
          ls -R public

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
