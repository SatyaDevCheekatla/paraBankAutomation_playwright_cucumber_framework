name: ParaBank UI CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Test on ${{ matrix.browser }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        browser:
          - chromium
          - firefox
          - webkit

    env:
      CI: true
      HEADLESS: true
      BROWSER: ${{ matrix.browser }}
      PARALLEL: 3
      BASE_URL: https://parabank.parasoft.com/parabank/
      PARABANK_USERNAME: john
      PARABANK_PASSWORD: demo
      TIMEOUT: 30000
      SLOW_MO: 0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Type check
        if: matrix.browser == 'chromium'
        run: npm run typecheck

      - name: Run Cucumber suite
        id: cucumber_run
        run: npm test
        continue-on-error: true

      - name: Generate Cucumber HTML report
        if: always()
        run: npm run report:generate

      - name: Upload browser JSON results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-json-${{ matrix.browser }}
          path: reports/cucumber-json/
          if-no-files-found: warn

      - name: Upload browser HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report-${{ matrix.browser }}
          path: reports/cucumber-html/
          if-no-files-found: warn

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.browser }}
          path: test-results/traces/
          if-no-files-found: warn

      - name: Fail job when tests fail
        if: steps.cucumber_run.outcome == 'failure'
        run: exit 1

  publish-report:
    name: Publish combined Cucumber report
    needs: test
    runs-on: ubuntu-latest
    if: always()

    permissions:
      pages: write
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download all JSON artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cucumber-json-*
          path: artifacts/json

      - name: Generate combined customer-facing report
        run: |
          node ./scripts/generate-cucumber-report.mjs --jsonDir artifacts/json --reportDir public --runId github-${{ github.run_id }}
          touch public/.nojekyll

      - name: Upload combined HTML report artifact
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report-combined
          path: public/
          if-no-files-found: error

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Email report links
        if: always() && secrets.EMAIL_USERNAME != '' && secrets.EMAIL_PASSWORD != '' && vars.REPORT_RECIPIENTS != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "ParaBank Automation Test Report - ${{ needs.test.result }}"
          to: ${{ vars.REPORT_RECIPIENTS }}
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            Test Execution Report
            ====================

            Matrix Result: ${{ needs.test.result }}

            View Cucumber Report:
            ${{ steps.deployment.outputs.page_url }}

            Workflow Run:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Regards,
            GitHub Actions
